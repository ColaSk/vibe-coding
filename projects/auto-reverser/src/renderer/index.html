<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Reverser - 浏览器自动逆向工具</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🔍</span>
                <span class="logo-text">Auto Reverser</span>
            </div>
            <div class="header-actions">
                <button id="btn-export" class="btn btn-secondary" disabled>导出报告</button>
                <button id="btn-theme" class="btn-theme" title="切换白天/黑夜模式">
                    <span class="theme-icon">🌙</span>
                    <span class="theme-label">深色</span>
                </button>
                <button id="btn-settings" class="btn btn-icon">⚙️</button>
            </div>
        </header>

        <main class="main-content">
            <section class="url-input-section">
                <div class="input-group">
                    <input type="text" id="url-input" class="url-input" 
                           placeholder="输入要分析的网站URL，例如: https://weibo.com/..." 
                           autocomplete="off">
                    <button id="btn-start" class="btn btn-primary">
                        <span class="btn-text">开始分析</span>
                        <span class="btn-loading hidden">分析中...</span>
                    </button>
                    <button id="btn-stop" class="btn btn-danger hidden">停止</button>
                </div>
                <div class="input-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="opt-intercept-xhr" checked>
                        拦截XHR/Fetch请求
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="opt-analyze-encryption" checked>
                        自动分析加密参数
                    </label>
                </div>
            </section>

            <section class="browser-section" id="browser-section">
                <div class="browser-toolbar">
                    <div class="browser-nav-buttons">
                        <button id="btn-back" class="btn-nav" disabled>◀</button>
                        <button id="btn-forward" class="btn-nav" disabled>▶</button>
                        <button id="btn-refresh" class="btn-nav">🔄</button>
                    </div>
                    <div class="browser-url-bar">
                        <span id="browser-current-url">about:blank</span>
                    </div>
                    <div class="browser-actions">
                        <button id="btn-devtools" class="btn btn-small">开发者工具</button>
                        <button id="btn-toggle-browser" class="btn btn-small btn-icon-small" title="折叠/展开浏览器">▼</button>
                    </div>
                </div>
                <div id="browser-container" class="browser-container">
                    <div class="browser-placeholder">
                        <p>输入URL并点击"开始分析"来加载网页</p>
                    </div>
                </div>
            </section>

            <div id="browser-resize-handle" class="browser-resize-handle">
                <div class="resize-handle-bar"></div>
            </div>

            <section class="analysis-section">
                <div class="panel-container" id="panel-container">
                    <div class="panel requests-panel" id="requests-panel">
                        <div class="panel-header">
                            <div class="panel-header-row">
                                <h3>请求列表 <span id="request-count" class="count-badge">0</span></h3>
                                <div class="panel-filters">
                                    <button class="filter-btn active" data-filter="all">全部</button>
                                    <button class="filter-btn" data-filter="api">API</button>
                                    <button class="filter-btn" data-filter="xhr">XHR</button>
                                    <button class="filter-btn" data-filter="encrypted">加密</button>
                                </div>
                            </div>
                            <div class="panel-search">
                                <input type="text" id="request-search" class="search-input" placeholder="搜索 URL...">
                            </div>
                        </div>
                        <div class="panel-content">
                            <div id="requests-list" class="requests-list">
                                <div class="empty-state">
                                    <p>等待捕获网络请求...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="panels-resize-handle" class="panels-resize-handle">
                        <div class="panels-resize-bar"></div>
                    </div>

                    <div class="panel detail-panel">
                        <div class="panel-header">
                            <div class="panel-header-row">
                                <h3>请求详情</h3>
                                <div class="panel-filters">
                                    <button id="btn-copy-request" class="filter-btn" disabled>复制</button>
                                    <button id="btn-replay-request" class="filter-btn" disabled>重放</button>
                                </div>
                            </div>
                            <div class="panel-header-row detail-tabs-row hidden" id="detail-tabs-container">
                            </div>
                        </div>
                        <div class="panel-content">
                            <div id="request-detail" class="request-detail">
                                <div class="empty-state">
                                    <p>选择一个请求查看详情</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="status-bar">
                <span id="status-text" class="status-text">就绪</span>
                <span id="status-stats" class="status-stats"></span>
            </div>
        </footer>
    </div>

    <div id="modal-container" class="modal-container hidden">
        <div class="modal-overlay"></div>
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-content" id="modal-content">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-cancel">取消</button>
                <button class="btn btn-primary modal-confirm">确定</button>
            </div>
        </div>
    </div>

    <script src="scripts/renderer.js"></script>
</body>
</html>
